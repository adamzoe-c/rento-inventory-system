<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rento | Partner Pulse</title>
    <style>
        body { font-family: sans-serif; background: #fff; color: #1a1a1a; padding: 40px; }
        header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #eee; padding: 25px; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .location { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .store-name { font-size: 18px; margin: 5px 0; font-weight: bold; }
        .stock-value { font-size: 40px; font-weight: 200; margin: 10px 0; }
        .status-tag { display: inline-block; padding: 4px 10px; font-size: 10px; border: 1px solid #eee; border-radius: 20px; text-transform: uppercase; }
        .low { color: #d9534f; border-color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Partner Inventory Pulse</h1>
        <p>Live Distribution Data (Internal Mirror)</p>
    </header>

    <div class="grid" id="dashboard-grid"></div>

    <script>
        // We put the data DIRECTLY here so it never fails to load
        const data = {
            "partners": [
                { "name": "Berlin Boutique", "location": "Berlin, Germany", "stock_level": 2, "status": "Low Stock" },
                { "name": "Helsinki Wellness", "location": "Helsinki, Finland", "stock_level": 15, "status": "Healthy" },
                { "name": "Amsterdam Design", "location": "Amsterdam, Netherlands", "stock_level": 8, "status": "Healthy" }
            ]
        };

        const grid = document.getElementById('dashboard-grid');
        
        // This runs instantly
        data.partners.forEach(partner => {
            const isLow = partner.stock_level < 3 ? 'low' : '';
            grid.innerHTML += 
                <div class="card">
                    <div class="location">${partner.location}</div>
                    <div class="store-name">${partner.name}</div>
                    <div class="stock-value">${partner.stock_level} Units</div>
                    <div class="status-tag ${isLow}">${partner.status}</div>
                </div>
            ;
        });
    </script>
</body>
</html>
